- name: Deploy to VM
  on:
    push:
      branches:
        - main
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.VM_HOST }}
    username: azureuser
    key: ${{ secrets.VM_SSH_KEY }}
    script: |
      cd /home/azureuser/app
      git pull origin main
      npm install
      pm2 restart all